name: News Scraper Scrape

on:
  schedule:
    # Runs every 15 minutes to keep news fresh
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run the scraper manually from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python aggregator.py

      - name: Commit and push articles.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news articles (auto)" && git push)
